<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 260px;
      font-family: 'Inter', system-ui, sans-serif;
      background: #09090b;
      color: #f4f4f5;
      padding: 20px;
      font-size: 13px;
    }
    .logo {
      font-size: 13px;
      font-weight: 700;
      color: #4ade80;
      margin-bottom: 16px;
      letter-spacing: -0.01em;
    }
    input {
      width: 100%;
      padding: 9px 12px;
      background: #18181b;
      border: 1px solid #3f3f46;
      border-radius: 12px;
      color: #f4f4f5;
      font-size: 13px;
      font-family: inherit;
      margin-bottom: 8px;
      outline: none;
      transition: border-color 0.15s;
    }
    input::placeholder { color: #71717a; }
    input:focus { border-color: #22c55e; }
    button {
      width: 100%;
      padding: 10px;
      border-radius: 12px;
      border: none;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    #btn-login  { background: #22c55e; color: #fff; }
    #btn-start  { background: #22c55e; color: #fff; }
    #btn-logout {
      background: #18181b;
      border: 1px solid #27272a;
      color: #71717a;
      margin-top: 8px;
      font-size: 11px;
      padding: 7px;
    }
    .status { margin-top: 10px; font-size: 11px; color: #71717a; text-align: center; min-height: 16px; }
    .status.error   { color: #f87171; }
    .status.success { color: #4ade80; }
    .user-email { font-size: 11px; color: #52525b; margin-bottom: 12px; }
    #screen-login     { display: block; }
    #screen-recording { display: none; }
  </style>
</head>
<body>
  <div class="logo">⬛ vitefait.io</div>

  <div id="screen-login">
    <input id="email"    type="email"    placeholder="Email" />
    <input id="password" type="password" placeholder="Mot de passe" />
    <button id="btn-login">Se connecter</button>
    <p id="login-status" class="status"></p>
  </div>

  <div id="screen-recording">
    <p id="user-email" class="user-email"></p>
    <button id="btn-start">● Démarrer l'enregistrement</button>
    <p id="rec-status" class="status"></p>
    <button id="btn-logout">Déconnexion</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
