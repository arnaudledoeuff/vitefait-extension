<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      font-family: 'Inter', system-ui, sans-serif;
      background: #09090b;
      color: #f4f4f5;
      padding: 20px;
      user-select: none;
    }
    .logo {
      font-size: 12px;
      font-weight: 700;
      color: #4ade80;
      margin-bottom: 14px;
      letter-spacing: -0.01em;
    }
    button {
      width: 100%;
      padding: 10px;
      border-radius: 12px;
      border: none;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover   { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    #btn-start { background: #22c55e; color: #fff; }
    #btn-stop  { background: #ef4444; color: #fff; display: none; }
    .status {
      margin-top: 10px;
      font-size: 11px;
      color: #71717a;
      text-align: center;
      min-height: 16px;
    }
    .status.error   { color: #f87171; }
    .status.success { color: #4ade80; }
    .dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #ef4444;
      animation: pulse 1s infinite;
      margin-right: 5px;
      vertical-align: middle;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  </style>
</head>
<body>
  <div class="logo">⬛ vitefait.io — Enregistreur</div>
  <button id="btn-start">● Démarrer l'enregistrement</button>
  <button id="btn-stop">■ Arrêter</button>
  <p id="status" class="status">Prêt</p>
  <script src="recorder.js"></script>
</body>
</html>
